# render.yaml — FreshZone Render service configuration
# Commit this file so your Render service is reproducible.
# Docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: freshzone-backend
    runtime: node
    plan: free          # change to "starter" or higher when ready
    region: singapore   # closest to PH; options: oregon, frankfurt, singapore, ohio
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

      # Set these in the Render dashboard — never commit real values here
      - key: DB_HOST
        sync: true
      - key: DB_PORT
        sync: true
      - key: DB_NAME
        sync: true
      - key: DB_USER
        sync: true
      - key: DB_PASS
        sync: true
      - key: JWT_SECRET
        sync: true
      - key: FRONTEND_URL
        sync: true
      - key: RENDER_BACKEND_URL
        sync: true
      - key: ESP32_API_KEY
        sync: true
      - key: ALLOW_LEGACY_ESP32_KEY
        value: "true"
      - key: RESEND_API_KEY
        sync: true
      - key: VAPID_PUBLIC_KEY
        sync: true
      - key: VAPID_PRIVATE_KEY
        sync: true
      - key: ADMIN_EMAIL
        sync: true
      - key: SENTRY_DSN
        sync: true
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
