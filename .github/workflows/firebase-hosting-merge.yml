# Deploy to Firebase Hosting on merge to main
name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # FIX: Removed "npm ci && npm run build" — there is no build script
      # in package.json. This was causing every deploy to fail.
      # If you add a build step in future (e.g. CSS minification), add it here.

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FRESHZONE_509A9 }}
          channelId: live
          projectId: freshzone-509a9
